<style>
  :root{
    --font-display:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --bg-a:#eef6ff;
    --bg-b:#f3f0ff;
    --bg-c:#eafff5;
    --ink:#151a2b;
    --ink-soft:#6b7280;
    --card:#ffffff;
    --border:#e7eaf3;
    --accent:#5b5ff9;
    --accent-soft:#eef0ff;

    --sub-italiano:#ef476f;
    --sub-matematica:#118ab2;
    --sub-inglese:#7209b7;
    --sub-scienze:#06a77d;
    --sub-storia:#f5a623;
    --sub-geografia:#3a86ff;
    --sub-greco:#c026d3;
    --sub-latino:#fb5607;
    --sub-altro:#64748b;
    --sub-evento:#334155;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;}
  html,body{
    font-family:var(--font-body);
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(900px 500px at -10% -10%, var(--bg-a), transparent 60%),
      radial-gradient(800px 500px at 110% 0%, var(--bg-b), transparent 55%),
      radial-gradient(900px 600px at 50% 120%, var(--bg-c), transparent 55%),
      #fbfcff;
    background-attachment:fixed;
  }

  .wrap{max-width:1040px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 20px) 18px 90px;}

  header{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:14px;margin-bottom:22px;flex-wrap:wrap;
  }
  h1{
    font-family:var(--font-display);
    font-weight:800;
    font-size:2rem;
    margin:0;
    letter-spacing:-.01em;
    background:linear-gradient(90deg,#5b5ff9,#c026d3);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1.1;
  }
  .tagline{font-size:.88rem;color:var(--ink-soft);margin-top:4px;font-weight:500;}

  .weeknav{
    display:flex;align-items:center;gap:6px;
    background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:6px 8px;
    box-shadow:0 4px 14px -6px rgba(20,20,50,.12);
  }
  .weeknav button{
    border:none;background:var(--accent-soft);color:var(--accent);
    font-size:1rem;font-weight:800;cursor:pointer;
    width:32px;height:32px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:hover{background:var(--accent);color:#fff;}
  .weeknav .label{font-weight:700;font-size:.86rem;white-space:nowrap;padding:0 6px;font-family:var(--font-display);}

  .legend{
    display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;
  }
  .tab{
    display:flex;align-items:center;gap:6px;
    padding:7px 13px 7px 9px;border-radius:999px;
    font-size:.78rem;font-weight:700;cursor:pointer;
    border:1.5px solid var(--border);background:var(--card);
    color:var(--ink-soft);
    transition:all .15s ease;
    user-select:none;
  }
  .tab .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .tab.active{color:#fff;border-color:transparent;box-shadow:0 4px 12px -4px rgba(0,0,0,.25);}
  .tab:active{transform:scale(.96);}

  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:12px;
  }
  @media (max-width:820px){
    .grid{grid-template-columns:1fr;}
  }

  .day{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    min-height:170px;
    display:flex;flex-direction:column;
    box-shadow:0 4px 16px -8px rgba(20,20,60,.10);
    overflow:hidden;
    transition:box-shadow .2s ease;
  }
  .day.today{
    border-color:transparent;
    box-shadow:0 0 0 2px var(--accent), 0 10px 24px -10px rgba(91,95,249,.35);
  }

  .day-head{
    padding:12px 14px 10px;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .day-head .dname{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);}
  .day-head .dnum{font-family:var(--font-display);font-weight:800;font-size:1.25rem;color:var(--ink);}
  .day.today .dname{color:var(--accent);}
  .day.today .dnum{color:var(--accent);}

  .tasks{flex:1;padding:0 10px;display:flex;flex-direction:column;gap:6px;}

  .task{
    display:flex;align-items:flex-start;gap:8px;
    padding:8px 10px 8px 14px;border-radius:12px;
    background:#f8f9fd;
    font-size:.82rem;
    cursor:pointer;
    position:relative;
    transition:background .15s ease;
  }
  .task::before{
    content:'';position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:4px;
    background:var(--tag-color, var(--sub-altro));
  }
  .task:hover{background:#f1f3fb;}
  .task.done{opacity:.45;}
  .task.done .ttitle{text-decoration:line-through;}
  .task input[type=checkbox]{margin-top:2px;accent-color:var(--accent);flex:none;width:16px;height:16px;}
  .ttitle{font-weight:700;word-break:break-word;}
  .ttitle .kicon{margin-right:4px;}
  .tnote{color:var(--ink-soft);font-size:.75rem;margin-top:1px;word-break:break-word;}
  .ttime{color:var(--ink-soft);font-size:.72rem;font-weight:700;margin-top:1px;}

  .addrow{display:flex;gap:6px;margin:8px 10px 12px;}
  .addbtn{
    flex:1;border:none;
    background:var(--accent-soft);color:var(--accent);
    border-radius:12px;padding:9px 6px;
    font-size:.74rem;font-weight:800;cursor:pointer;
    transition:background .15s ease;
  }
  .addbtn:hover{background:var(--accent);color:#fff;}
  .addbtn.evt{background:#eef2f6;color:var(--sub-evento);}
  .addbtn.evt:hover{background:var(--sub-evento);color:#fff;}

  .empty{color:var(--ink-soft);font-size:.78rem;font-weight:500;padding:6px 4px 2px;opacity:.7;}

  .bell-btn{
    background:var(--card);color:var(--ink-soft);
    width:38px;height:38px;border-radius:14px;font-size:1.05rem;cursor:pointer;
    border:1px solid var(--border);box-shadow:0 4px 14px -6px rgba(20,20,50,.12);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .bell-btn.on{background:var(--accent);color:#fff;border-color:transparent;}
  .bell-btn:hover{transform:scale(1.06);}

  .banner{
    display:flex;align-items:flex-start;gap:10px;
    background:linear-gradient(90deg, #fff7ed, #fff1f4);
    border:1px solid #ffd9b8;
    border-radius:16px;padding:12px 14px;margin-bottom:18px;
  }
  .banner .bicon{font-size:1.1rem;flex:none;margin-top:1px;}
  .banner .btitle{font-weight:800;font-size:.86rem;color:#c1440e;margin-bottom:4px;font-family:var(--font-display);}
  .banner .blist{display:flex;flex-direction:column;gap:3px;}
  .banner .bitem{font-size:.8rem;color:var(--ink);}
  .banner .bitem b{font-weight:800;}
  .banner .bwhen{color:var(--ink-soft);font-weight:600;}

  .install-banner{
    display:flex;align-items:center;gap:10px;
    background:var(--accent-soft);border:1px solid #d9dcff;
    border-radius:16px;padding:11px 14px;margin-bottom:18px;
    font-size:.8rem;color:var(--ink);
  }
  .install-banner .iicon{font-size:1.1rem;}
  .install-banner button{
    margin-left:auto;border:none;background:var(--accent);color:#fff;
    border-radius:10px;padding:7px 12px;font-weight:800;font-size:.76rem;cursor:pointer;flex:none;
  }
  .install-banner .close{background:transparent;color:var(--ink-soft);font-size:1rem;padding:2px 4px;}

  .overlay{
    position:fixed;inset:0;background:rgba(15,18,35,.45);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;backdrop-filter:blur(2px);
  }
  @media (min-width:600px){.overlay{align-items:center;}}
  .modal{
    background:var(--card);width:100%;max-width:430px;
    border-radius:24px 24px 0 0;padding:22px;
    box-shadow:0 -8px 40px rgba(20,20,60,.2);
    max-height:88vh;overflow-y:auto;
  }
  @media (min-width:600px){.modal{border-radius:24px;}}
  .modal h2{font-family:var(--font-display);font-weight:800;margin:0 0 16px;font-size:1.3rem;}
  .kind-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .kind-toggle button{
    flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--border);
    background:#f8f9fd;color:var(--ink-soft);font-weight:800;font-size:.82rem;cursor:pointer;
  }
  .kind-toggle button.sel{border-color:transparent;color:#fff;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.72rem;font-weight:800;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  .field input[type=text], .field input[type=time], .field textarea{
    width:100%;border:1.5px solid var(--border);border-radius:12px;
    padding:10px 12px;font-family:inherit;font-size:.92rem;background:#f8f9fd;color:var(--ink);
    outline:none;
  }
  .field input:focus, .field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:54px;}
  .subject-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .subject-pick .opt{
    padding:7px 12px;border-radius:999px;font-size:.78rem;font-weight:700;
    border:1.5px solid var(--border);cursor:pointer;background:#f8f9fd;color:var(--ink-soft);
    transition:all .15s ease;
  }
  .subject-pick .opt.sel{color:#fff;border-color:transparent;}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .btn{flex:1;border:none;border-radius:14px;padding:12px;font-weight:800;font-size:.88rem;cursor:pointer;font-family:var(--font-body);}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:hover{background:#4548d6;}
  .btn.ghost{background:#f1f2f8;color:var(--ink-soft);}
  .btn.danger{background:transparent;color:#ef476f;flex:.7;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;
    font-size:.82rem;font-weight:600;opacity:0;transition:opacity .25s ease;z-index:60;pointer-events:none;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Diario delle Vacanze</h1>
      <div class="tagline">Compiti e avvenimenti, giorno per giorno</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="notifyBtn" class="bell-btn" aria-label="Attiva avvisi scadenze" title="Attiva avvisi scadenze">🔔</button>
      <div class="weeknav">
        <button id="prevWeek" aria-label="Settimana precedente">‹</button>
        <span class="label" id="weekLabel"></span>
        <button id="nextWeek" aria-label="Settimana successiva">›</button>
      </div>
    </div>
  </header>

  <div id="installWrap"></div>
  <div id="bannerWrap"></div>

  <div class="legend" id="legend"></div>

  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUBJECTS = [
  {id:'italiano', name:'Italiano', color:'var(--sub-italiano)'},
  {id:'matematica', name:'Matematica', color:'var(--sub-matematica)'},
  {id:'inglese', name:'Inglese', color:'var(--sub-inglese)'},
  {id:'scienze', name:'Scienze', color:'var(--sub-scienze)'},
  {id:'storia', name:'Storia', color:'var(--sub-storia)'},
  {id:'geografia', name:'Geografia', color:'var(--sub-geografia)'},
  {id:'greco', name:'Greco', color:'var(--sub-greco)'},
  {id:'latino', name:'Latino', color:'var(--sub-latino)'},
  {id:'altro', name:'Ripetizioni', color:'var(--sub-altro)'},
];
const EVENT_TAG = {id:'evento', name:'Avvenimenti', color:'var(--sub-evento)'};
const LEGEND_TAGS = [...SUBJECTS, EVENT_TAG];
const DAY_NAMES = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const STORAGE_KEY = 'diario-vacanze:tasks';
const SETTINGS_KEY = 'diario-vacanze:settings';

let tasks = [];
let settings = {notifyEnabled:false, lastNotifiedDate:null, installDismissed:false};
let activeFilter = null;
let weekOffset = 0;
let deferredInstallPrompt = null;

function tagInfo(t){
  if(t.kind === 'evento') return EVENT_TAG;
  return SUBJECTS.find(s=>s.id===t.subject) || SUBJECTS[SUBJECTS.length-1];
}

function toISODate(d){
  const yy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${yy}-${mm}-${dd}`;
}

function startOfWeek(offset){
  const now = new Date();
  now.setHours(0,0,0,0);
  const dow = (now.getDay()+6)%7;
  const monday = new Date(now);
  monday.setDate(now.getDate()-dow+offset*7);
  return monday;
}

function fmtRange(monday){
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt = d => d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
  return `${fmt(monday)} – ${fmt(sunday)}`;
}

async function loadTasks(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
    tasks.forEach(t=>{ if(!t.kind) t.kind = 'compito'; });
  }catch(e){
    tasks = [];
  }
}

async function saveTasks(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }catch(e){
    showToast('Errore nel salvataggio, riprova.');
  }
}

async function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    settings = raw ? JSON.parse(raw) : {notifyEnabled:false, lastNotifiedDate:null, installDismissed:false};
  }catch(e){
    settings = {notifyEnabled:false, lastNotifiedDate:null, installDismissed:false};
  }
}

async function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }catch(e){}
}

function daysUntil(iso){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(iso+'T00:00:00');
  return Math.round((target-today)/86400000);
}

function getDueSoonTasks(){
  return tasks
    .filter(t=>!t.done)
    .map(t=>({...t, daysLeft:daysUntil(t.date)}))
    .filter(t=>t.daysLeft>=0 && t.daysLeft<=2)
    .sort((a,b)=>a.daysLeft-b.daysLeft);
}

function whenLabel(daysLeft){
  if(daysLeft===0) return 'oggi';
  if(daysLeft===1) return 'domani';
  return `in ${daysLeft} giorni`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderBanner(){
  const wrap = document.getElementById('bannerWrap');
  const dueSoon = getDueSoonTasks();
  if(dueSoon.length===0){ wrap.innerHTML=''; return; }
  const items = dueSoon.map(t=>{
    const tag = tagInfo(t);
    const icon = t.kind==='evento' ? '📌 ' : '';
    return `<div class="bitem"><b style="color:${tag.color}">${tag.name}</b> — ${icon}${escapeHtml(t.title)} <span class="bwhen">(${whenLabel(t.daysLeft)})</span></div>`;
  }).join('');
  wrap.innerHTML = `
    <div class="banner">
      <span class="bicon">⏰</span>
      <div>
        <div class="btitle">In arrivo</div>
        <div class="blist">${items}</div>
      </div>
    </div>`;
}

function renderInstallBanner(){
  const wrap = document.getElementById('installWrap');
  if(settings.installDismissed){ wrap.innerHTML=''; return; }
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isStandalone){ wrap.innerHTML=''; return; }
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let text, action;
  if(deferredInstallPrompt){
    text = 'Installa questa app sulla tua schermata Home.';
    action = '<button id="doInstall">Installa</button>';
  } else if(isIOS){
    text = 'Per installarla: tocca Condividi → Aggiungi a Home.';
    action = '';
  } else {
    text = 'Apri il menu del browser e scegli “Aggiungi a schermata Home”.';
    action = '';
  }
  wrap.innerHTML = `
    <div class="install-banner">
      <span class="iicon">📱</span>
      <span>${text}</span>
      ${action}
      <button class="close" id="dismissInstall" aria-label="Chiudi">✕</button>
    </div>`;
  const installBtn = document.getElementById('doInstall');
  if(installBtn){
    installBtn.onclick = async ()=>{
      if(deferredInstallPrompt){
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        renderInstallBanner();
      }
    };
  }
  document.getElementById('dismissInstall').onclick = async ()=>{
    settings.installDismissed = true;
    await saveSettings();
    renderInstallBanner();
  };
}

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  renderInstallBanner();
});

async function maybeSendNotification(){
  if(!settings.notifyEnabled) return;
  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const todayISO = toISODate(new Date());
  if(settings.lastNotifiedDate === todayISO) return;
  const dueSoon = getDueSoonTasks();
  if(dueSoon.length===0) return;
  try{
    const titles = dueSoon.slice(0,3).map(t=>t.title).join(', ');
    new Notification('Compiti e avvenimenti in scadenza', {
      body: dueSoon.length===1 ? titles : `${dueSoon.length} in arrivo: ${titles}${dueSoon.length>3?'…':''}`,
    });
    settings.lastNotifiedDate = todayISO;
    await saveSettings();
  }catch(e){}
}

function updateBellUI(){
  const btn = document.getElementById('notifyBtn');
  const supported = typeof Notification !== 'undefined';
  const granted = supported && Notification.permission === 'granted' && settings.notifyEnabled;
  btn.classList.toggle('on', granted);
  btn.title = granted ? 'Avvisi attivi' : 'Attiva avvisi scadenze';
}

async function toggleNotify(){
  if(typeof Notification === 'undefined'){
    showToast('Il tuo browser non supporta le notifiche.');
    return;
  }
  if(settings.notifyEnabled){
    settings.notifyEnabled = false;
    await saveSettings();
    updateBellUI();
    showToast('Avvisi disattivati');
    return;
  }
  try{
    const perm = await Notification.requestPermission();
    if(perm === 'granted'){
      settings.notifyEnabled = true;
      settings.lastNotifiedDate = null;
      await saveSettings();
      updateBellUI();
      showToast('Avvisi attivati per questa pagina');
      maybeSendNotification();
    } else {
      showToast('Permesso non concesso');
    }
  }catch(e){
    showToast('Notifiche non disponibili qui');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = '';
  const allTab = document.createElement('div');
  allTab.className = 'tab' + (activeFilter===null ? ' active' : '');
  if(activeFilter===null) allTab.style.background = 'var(--ink-soft)';
  allTab.innerHTML = `<span class="dot" style="background:${activeFilter===null?'#fff':'var(--ink-soft)'}"></span>Tutte`;
  allTab.onclick = () => { activeFilter=null; render(); };
  el.appendChild(allTab);
  LEGEND_TAGS.forEach(s=>{
    const isActive = activeFilter===s.id;
    const tab = document.createElement('div');
    tab.className = 'tab' + (isActive ? ' active':'');
    if(isActive) tab.style.background = s.color;
    tab.innerHTML = `<span class="dot" style="background:${isActive?'#fff':s.color}"></span>${s.name}`;
    tab.onclick = () => { activeFilter = (activeFilter===s.id) ? null : s.id; render(); };
    el.appendChild(tab);
  });
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const monday = startOfWeek(weekOffset);
  const todayISO = toISODate(new Date());
  document.getElementById('weekLabel').textContent = fmtRange(monday);

  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const iso = toISODate(d);
    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (iso===todayISO ? ' today':'');

    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `<span class="dname">${DAY_NAMES[i]}</span><span class="dnum">${d.getDate()}</span>`;
    dayEl.appendChild(head);

    const taskWrap = document.createElement('div');
    taskWrap.className = 'tasks';
    const dayTasks = tasks
      .filter(t=>t.date===iso)
      .filter(t=>{
        if(!activeFilter) return true;
        const tag = tagInfo(t);
        return tag.id === activeFilter;
      })
      .sort((a,b)=> (a.done - b.done) || (a.time||'').localeCompare(b.time||''));

    if(dayTasks.length===0){
      const e = document.createElement('div');
      e.className='empty';
      e.textContent = activeFilter ? '—' : 'Niente in programma';
      taskWrap.appendChild(e);
    }

    dayTasks.forEach(t=>{
      const tag = tagInfo(t);
      const row = document.createElement('div');
      row.className = 'task' + (t.done ? ' done':'');
      row.style.setProperty('--tag-color', tag.color);
      const icon = t.kind==='evento' ? '<span class="kicon">📌</span>' : '';
      row.innerHTML = `
        <input type="checkbox" ${t.done?'checked':''} aria-label="Segna come fatto">
        <div>
          <div class="ttitle">${icon}${escapeHtml(t.title)}</div>
          ${t.time ? `<div class="ttime">${escapeHtml(t.time)}</div>` : ''}
          ${t.note ? `<div class="tnote">${escapeHtml(t.note)}</div>` : ''}
        </div>`;
      row.querySelector('input').onclick = (e)=>{
        e.stopPropagation();
        t.done = !t.done;
        saveTasks();
        renderGrid();
      };
      row.onclick = ()=> openModal(iso, t);
      taskWrap.appendChild(row);
    });

    dayEl.appendChild(taskWrap);

    const addRow = document.createElement('div');
    addRow.className = 'addrow';
    const addTaskBtn = document.createElement('button');
    addTaskBtn.className = 'addbtn';
    addTaskBtn.textContent = '+ Compito';
    addTaskBtn.onclick = ()=> openModal(iso, null, 'compito');
    const addEventBtn = document.createElement('button');
    addEventBtn.className = 'addbtn evt';
    addEventBtn.textContent = '+ Evento';
    addEventBtn.onclick = ()=> openModal(iso, null, 'evento');
    addRow.appendChild(addTaskBtn);
    addRow.appendChild(addEventBtn);
    dayEl.appendChild(addRow);

    grid.appendChild(dayEl);
  }
}

function render(){
  renderInstallBanner();
  renderBanner();
  renderLegend();
  renderGrid();
}

function openModal(dateISO, task, defaultKind){
  const isEdit = !!task;
  let kind = task ? task.kind : (defaultKind || 'compito');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>${isEdit ? 'Modifica' : 'Nuovo'}</h2>
      <div class="kind-toggle">
        <button id="kindCompito" type="button">📚 Compito</button>
        <button id="kindEvento" type="button">📌 Evento</button>
      </div>
      <div class="field" id="subjectField">
        <label>Materia</label>
        <div class="subject-pick" id="subjectPick"></div>
      </div>
      <div class="field">
        <label>${kind==='evento' ? 'Cosa succede' : 'Cosa devi fare'}</label>
        <input type="text" id="fTitle" maxlength="80" placeholder="${kind==='evento' ? 'Es. Gita, verifica, appuntamento' : 'Es. Esercizi pag. 42'}">
      </div>
      <div class="field" id="timeField">
        <label>Ora (opzionale)</label>
        <input type="time" id="fTime">
      </div>
      <div class="field">
        <label>Note (opzionale)</label>
        <textarea id="fNote" maxlength="200" placeholder="Dettagli extra..."></textarea>
      </div>
      <div class="modal-actions">
        ${isEdit ? '<button class="btn danger" id="btnDelete">Elimina</button>' : ''}
        <button class="btn ghost" id="btnCancel">Annulla</button>
        <button class="btn primary" id="btnSave">Salva</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  let selectedSubject = task && task.subject ? task.subject : SUBJECTS[0].id;
  const pick = overlay.querySelector('#subjectPick');
  SUBJECTS.forEach(s=>{
    const opt = document.createElement('div');
    opt.className = 'opt' + (selectedSubject===s.id ? ' sel':'');
    opt.textContent = s.name;
    if(selectedSubject===s.id) opt.style.background = s.color;
    opt.onclick = ()=>{
      selectedSubject = s.id;
      pick.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel'); o.style.background='';});
      opt.classList.add('sel');
      opt.style.background = s.color;
    };
    pick.appendChild(opt);
  });

  const titleInput = overlay.querySelector('#fTitle');
  const timeInput = overlay.querySelector('#fTime');
  const subjectField = overlay.querySelector('#subjectField');
  const timeField = overlay.querySelector('#timeField');
  const kindCompitoBtn = overlay.querySelector('#kindCompito');
  const kindEventoBtn = overlay.querySelector('#kindEvento');

  function updateKindUI(){
    kindCompitoBtn.classList.toggle('sel', kind==='compito');
    kindEventoBtn.classList.toggle('sel', kind==='evento');
    kindCompitoBtn.style.background = kind==='compito' ? SUBJECTS[0].color.startsWith('var') ? 'var(--accent)' : SUBJECTS[0].color : '';
    kindCompitoBtn.style.background = kind==='compito' ? 'var(--accent)' : '';
    kindEventoBtn.style.background = kind==='evento' ? 'var(--sub-evento)' : '';
    subjectField.style.display = kind==='compito' ? '' : 'none';
    timeField.style.display = kind==='evento' ? '' : 'none';
    titleInput.placeholder = kind==='evento' ? 'Es. Gita, verifica, appuntamento' : 'Es. Esercizi pag. 42';
  }
  kindCompitoBtn.onclick = ()=>{ kind='compito'; updateKindUI(); };
  kindEventoBtn.onclick = ()=>{ kind='evento'; updateKindUI(); };
  updateKindUI();

  titleInput.value = task ? task.title : '';
  timeInput.value = task ? (task.time||'') : '';
  overlay.querySelector('#fNote').value = task ? (task.note||'') : '';

  overlay.querySelector('#btnCancel').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  if(isEdit){
    overlay.querySelector('#btnDelete').onclick = ()=>{
      tasks = tasks.filter(t=>t.id!==task.id);
      saveTasks();
      overlay.remove();
      render();
      showToast('Eliminato');
    };
  }

  overlay.querySelector('#btnSave').onclick = async ()=>{
    const title = titleInput.value.trim();
    if(!title){
      titleInput.style.borderColor = '#ef476f';
      return;
    }
    const note = overlay.querySelector('#fNote').value.trim();
    const time = timeInput.value;
    if(isEdit){
      task.title = title; task.note = note; task.kind = kind;
      task.subject = kind==='compito' ? selectedSubject : null;
      task.time = kind==='evento' ? time : '';
    } else {
      tasks.push({
        id: 't' + Date.now() + Math.random().toString(36).slice(2,7),
        date: dateISO,
        kind: kind,
        subject: kind==='compito' ? selectedSubject : null,
        time: kind==='evento' ? time : '',
        title, note, done:false
      });
    }
    await saveTasks();
    overlay.remove();
    render();
    showToast(isEdit ? 'Aggiornato' : 'Aggiunto');
  };

  setTimeout(()=> titleInput.focus(), 50);
}

document.getElementById('prevWeek').onclick = ()=>{ weekOffset--; renderGrid(); };
document.getElementById('nextWeek').onclick = ()=>{ weekOffset++; renderGrid(); };
document.getElementById('notifyBtn').onclick = toggleNotify;

(async function init(){
  await loadTasks();
  await loadSettings();
  render();
  updateBellUI();
  maybeSendNotification();
})();
</script>
</body>
</html>
